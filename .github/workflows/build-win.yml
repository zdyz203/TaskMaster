name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller build
        run: |
          pyinstaller TaskMaster.win.spec --noconfirm --clean
          pyinstaller --onefile --console --name notify --distpath dist/TaskMaster --workpath build/notify --specpath build/notify --noconfirm --clean notify.py

      # windows-latest 自带 Inno Setup 6 (ISCC.exe 在 C:\Program Files (x86)\Inno Setup 6\)
      # 防止哪天 runner 镜像下掉,这里用 chocolatey 兜底
      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskMaster-windows-x64
          path: dist/TaskMaster-*-Setup.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaskMaster-*-Setup.exe
